<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GlicoTrack{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-gradient-to-r from-blue-900 to-blue-700 text-white shadow-lg">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <a href="/dashboard" class="flex items-center gap-2 text-xl font-bold tracking-tight">
                    <span class="text-2xl">💉</span>
                    <span>GlicoTrack</span>
                </a>

                <!-- Menu desktop -->
                <div class="hidden md:flex items-center space-x-1 text-sm font-medium">
                    <a href="/dashboard" class="flex items-center gap-1.5 px-3 py-2 rounded-lg hover:bg-white/10 transition">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
                        Painel
                    </a>
                    <a href="/glicemia/registrar" class="flex items-center gap-1.5 px-3 py-2 rounded-lg hover:bg-white/10 transition">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        Glicemia
                    </a>
                    <a href="/glicemia/historico" class="flex items-center gap-1.5 px-3 py-2 rounded-lg hover:bg-white/10 transition">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                        Histórico
                    </a>
                    <a href="/registros/historico" class="flex items-center gap-1.5 px-3 py-2 rounded-lg hover:bg-white/10 transition">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                        Registros
                    </a>
                    <a href="/relatorio" class="flex items-center gap-1.5 px-3 py-2 rounded-lg hover:bg-white/10 transition">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
                        Relatório
                    </a>
                    <a href="/configuracoes" class="flex items-center gap-1.5 px-3 py-2 rounded-lg hover:bg-white/10 transition">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        Config
                    </a>
                    <a href="/logout" class="flex items-center gap-1.5 px-3 py-2 rounded-lg hover:bg-red-500/20 text-red-200 transition ml-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                        Sair
                    </a>
                </div>

                <!-- Botão hambúrguer (mobile) -->
                <button id="menu-btn" class="md:hidden p-2 rounded-lg hover:bg-white/10 focus:outline-none">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Menu mobile -->
        <div id="mobile-menu" class="md:hidden hidden border-t border-white/10 px-4 py-2 space-y-1">
            <a href="/dashboard" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/10 text-sm">🏠 Painel</a>
            <a href="/glicemia/registrar" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/10 text-sm">💉 Registrar Glicemia</a>
            <a href="/glicemia/historico" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/10 text-sm">📊 Histórico</a>
            <a href="/registros/historico" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/10 text-sm">📋 Registros</a>
            <a href="/relatorio" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/10 text-sm">📄 Relatório PDF</a>
            <a href="/configuracoes" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/10 text-sm">⚙️ Configurações</a>
            <a href="/logout" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-red-500/20 text-red-200 text-sm">🚪 Sair</a>
        </div>
    </nav>

    <!-- Conteúdo principal -->
    <main class="flex-1 max-w-6xl w-full mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <!-- Rodapé -->
    <footer class="text-center text-xs text-gray-400 py-4 border-t border-gray-200">
        GlicoTrack — Acompanhamento de Glicemia para Diabetes Tipo 2
    </footer>

    <script>
        document.getElementById('menu-btn').addEventListener('click', function() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
